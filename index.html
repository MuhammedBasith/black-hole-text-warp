<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Typographic Black Hole</title>
  <meta name="description" content="Interactive text that warps around black holes in real-time." />
  <meta property="og:title" content="Typographic Black Hole" />
  <meta property="og:description" content="Text warps, spirals, and lenses around black holes. Built with pretext." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #08080e;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; width: 100%; height: 100%; }

    body { cursor: crosshair; }
    body.cursor-grab { cursor: grab; }
    body.cursor-grabbing { cursor: grabbing; }

    #hud {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10;
    }

    #hint {
      position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(200, 190, 175, 0.3);
      font: 300 12px/1 'Inter', sans-serif;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: opacity 2s ease;
    }
    #hint.hidden { opacity: 0; }

    #controls {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 18px;
      opacity: 0; transition: opacity 1s ease 0.5s;
    }
    #controls.visible { opacity: 1; }

    .ch {
      display: flex; align-items: center; gap: 5px;
      color: rgba(200, 190, 175, 0.18);
      font: 300 10px/1 'Inter', sans-serif;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .k {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 4px;
      border: 1px solid rgba(200, 190, 175, 0.1); border-radius: 3px;
      font-size: 9px; color: rgba(200, 190, 175, 0.22);
    }

    #flash {
      position: fixed; inset: 0;
      opacity: 0; pointer-events: none; z-index: 5;
      transition: opacity 0.06s ease-out;
    }
    #flash.active { opacity: 1; transition: none; }

    #stats {
      position: absolute; top: 22px; right: 28px;
      color: rgba(200, 190, 175, 0.15);
      font: 300 10px/1.6 'Inter', sans-serif;
      letter-spacing: 0.08em;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #stats.visible { opacity: 1; }

    #paused-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(200, 190, 175, 0.2);
      font: 300 13px/1 'Inter', sans-serif;
      letter-spacing: 0.35em; text-transform: uppercase;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #paused-badge.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="hud">
    <div id="hint">Click to create a singularity</div>
    <div id="stats"></div>
    <div id="controls">
      <span class="ch"><span class="k">Click</span> Create</span>
      <span class="ch"><span class="k">Drag</span> Move</span>
      <span class="ch"><span class="k">Scroll</span> Mass</span>
      <span class="ch"><span class="k">R</span> Reset</span>
      <span class="ch"><span class="k">Space</span> Pause</span>
    </div>
    <div id="paused-badge">Paused</div>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
