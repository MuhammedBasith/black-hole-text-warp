<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Typographic Black Hole</title>
  <meta name="description" content="Interactive text that warps around black holes. Click to create singularities." />
  <meta property="og:title" content="Typographic Black Hole" />
  <meta property="og:description" content="Text warps, spirals, and lenses around black holes in real-time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      cursor: crosshair;
      font-family: 'EB Garamond', Georgia, serif;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(232, 220, 200, 0.4);
      font-size: 14px;
      font-family: 'EB Garamond', Georgia, serif;
      letter-spacing: 0.1em;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 10;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="hint">Click to create a black hole &middot; Drag to fling</div>
  <canvas id="canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
